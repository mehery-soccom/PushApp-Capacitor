<ion-header class="shop-header ion-no-border">
  <ion-toolbar>
    <div class="toolbar-brand" slot="start">
      <div class="toolbar-logo">
        <ion-icon name="bag-handle-outline"></ion-icon>
      </div>
      <div>
        <p class="toolbar-greeting">Hello, {{ displayName }}</p>
        <h1 class="toolbar-title">Your watchlist</h1>
      </div>
    </div>
    <ion-buttons slot="end">
      <ion-button fill="clear" class="icon-btn">
        <ion-icon name="notifications-outline"></ion-icon>
        <span class="notif-dot"></span>
      </ion-button>
      <ion-button fill="clear" class="icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="search-bar">
    <ion-icon name="search-outline"></ion-icon>
    <input type="text" placeholder="Search products, brands…" readonly />
    <ion-icon name="options-outline" class="filter-icon"></ion-icon>
  </div>
</ion-header>

<ion-content [fullscreen]="true" class="shop-content">
  <section class="stats-row">
    <div class="stat-card" *ngFor="let stat of stats">
      <ion-icon [name]="stat.icon"></ion-icon>
      <div>
        <span class="stat-value">{{ stat.value }}</span>
        <span class="stat-label">{{ stat.label }}</span>
      </div>
    </div>
  </section>

  <section class="promo-section">
    <div class="section-head">
      <h2>Today&apos;s spotlight</h2>
      <span class="badge-live">Live offer</span>
    </div>
    <div class="placeholder-container">
      <div id="wave-placeholder" class="pushapp-placeholder-view"></div>
    </div>
  </section>

  <section class="products-section">
    <div class="section-head">
      <h2>Saved for later</h2>
      <button type="button" class="link-btn">See all</button>
    </div>
    <div class="product-grid">
      <article class="product-card" *ngFor="let product of products">
        <div class="product-image" [style.background]="product.gradient">
          <span class="product-emoji">{{ product.emoji }}</span>
          <button type="button" class="wish-btn" aria-label="Add to wishlist">
            <ion-icon name="heart-outline"></ion-icon>
          </button>
        </div>
        <div class="product-body">
          <p class="product-brand">{{ product.brand }}</p>
          <h3 class="product-name">{{ product.name }}</h3>
          <div class="product-footer">
            <span class="product-price">{{ product.price }}</span>
            <span class="product-rating">
              <ion-icon name="star"></ion-icon>
              {{ product.rating }}
            </span>
          </div>
        </div>
      </article>
    </div>
  </section>

  <div class="fab-spacer"></div>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button id="tooltip-target" class="deals-fab" (click)="onCircleButtonClick()">
    <ion-icon name="flash"></ion-icon>
  </ion-fab-button>
</ion-fab>
