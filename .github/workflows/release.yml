name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: Verify package version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Version OK: $PKG"

      - name: Lint, test, contract
        run: |
          npm run eslint
          npm run build
          npm test
          npm run test:contract

      - name: Dependency audit summary
        run: npm run audit:deps

  github-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HEADER="## [${VERSION}]"
          awk -v header="$HEADER" '
            index($0, header) == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release notes for ${VERSION} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: pushapp-ionic ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
