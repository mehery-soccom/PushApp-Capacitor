name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript — lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: ESLint
        run: npm run eslint

      - name: Prettier
        run: npm run prettier -- --check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Cross-platform error code contract
        run: npm run test:contract

  android:
    name: Android — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: Gradle unit tests
        run: cd android && ./gradlew test --no-daemon

  ios:
    name: iOS — SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps

      - name: SwiftLint
        run: npm run swiftlint -- lint
